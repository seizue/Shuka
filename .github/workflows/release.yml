name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # Windows installer
  windows:
    name: Build Windows Installer
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Publish
        run: dotnet publish Shuka.csproj -c Release -r win-x64 --self-contained true -o bin/publish

      - name: Install Playwright browsers
        run: bin/publish/Shuka.exe playwright install chromium

      - name: Build installer (Inno Setup)
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.4
        with:
          path: installer.iss
          options: /DMyAppVersion=${{ github.ref_name }}

      - name: Rename installer
        id: rename_installer
        shell: pwsh
        run: |
          $tag     = "${{ github.ref_name }}"
          $newName = "Shuka-Windows-$tag.exe"
          Move-Item "installer_output\Shuka_Setup.exe" "installer_output\$newName"
          echo "INSTALLER_PATH=installer_output\$newName" >> $env:GITHUB_OUTPUT
          echo "INSTALLER_NAME=$newName"                  >> $env:GITHUB_OUTPUT

      - name: Zip installer
        id: zip_installer
        shell: pwsh
        run: |
          $tag     = "${{ github.ref_name }}"
          $zipName = "Shuka-Windows-$tag.zip"
          Compress-Archive -Path "${{ steps.rename_installer.outputs.INSTALLER_PATH }}" -DestinationPath $zipName
          echo "ZIP_PATH=$zipName" >> $env:GITHUB_OUTPUT

      - name: Build changelog
        id: changelog
        shell: pwsh
        run: |
          # Get the previous tag; fall back to first commit if this is the first tag
          $prev = git describe --tags --abbrev=0 HEAD^ 2>$null
          if (-not $prev) { $prev = git rev-list --max-parents=0 HEAD }

          $log = git log "$prev..HEAD" --pretty=format:"- %s (%h)" --no-merges
          if (-not $log) { $log = "- Initial release" }

          # Write to a file to avoid multiline env-var issues
          $log | Out-File -FilePath changelog.txt -Encoding utf8
          echo "FILE=changelog.txt" >> $env:GITHUB_OUTPUT

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          name: Shuka ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: changelog.txt
          files: |
            ${{ steps.rename_installer.outputs.INSTALLER_PATH }}
            ${{ steps.zip_installer.outputs.ZIP_PATH }}

  # Android APK
  android:
    name: Build Android APK
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Install MAUI Android workload
        run: dotnet workload install maui-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: "17"

      - name: Decode keystore
        run: |
          $bytes = [Convert]::FromBase64String("${{ secrets.KEYSTORE_BASE64 }}")
          [IO.File]::WriteAllBytes("${{ github.workspace }}\shuka.keystore", $bytes)
        shell: pwsh

      - name: Build Release APK
        run: >
          dotnet publish Shuka.Android/Shuka.Android.csproj
          -f net9.0-android
          -c Release
          -p:RuntimeIdentifier=android-arm64
          -p:AndroidSigningKeyStore=${{ github.workspace }}\shuka.keystore
          -p:AndroidSigningKeyAlias=${{ secrets.KEY_ALIAS }}
          -p:AndroidSigningKeyPass=${{ secrets.KEY_PASSWORD }}
          -p:AndroidSigningStorePass=${{ secrets.STORE_PASSWORD }}
          -p:AndroidPackageFormats=apk
          -o publish_output

      - name: Locate APK
        id: find_apk
        shell: pwsh
        run: |
          $apk = Get-ChildItem -Recurse -Filter "*.apk" publish_output | Select-Object -First 1
          echo "APK_PATH=$($apk.FullName)" >> $env:GITHUB_OUTPUT
          echo "APK_NAME=$($apk.Name)"     >> $env:GITHUB_OUTPUT

      - name: Rename APK
        id: rename_apk
        shell: pwsh
        run: |
          $tag     = "${{ github.ref_name }}"
          $newName = "Shuka-Android-$tag.apk"
          $newPath = Join-Path (Split-Path "${{ steps.find_apk.outputs.APK_PATH }}") $newName
          Move-Item "${{ steps.find_apk.outputs.APK_PATH }}" $newPath
          echo "APK_PATH=$newPath" >> $env:GITHUB_OUTPUT
          echo "APK_NAME=$newName" >> $env:GITHUB_OUTPUT

      - name: Zip APK
        id: zip_apk
        shell: pwsh
        run: |
          $tag     = "${{ github.ref_name }}"
          $zipName = "Shuka-Android-$tag.zip"
          Compress-Archive -Path "${{ steps.rename_apk.outputs.APK_PATH }}" -DestinationPath $zipName
          echo "ZIP_PATH=$zipName" >> $env:GITHUB_OUTPUT

      - name: Build changelog
        id: changelog
        shell: pwsh
        run: |
          $prev = git describe --tags --abbrev=0 HEAD^ 2>$null
          if (-not $prev) { $prev = git rev-list --max-parents=0 HEAD }

          $log = git log "$prev..HEAD" --pretty=format:"- %s (%h)" --no-merges
          if (-not $log) { $log = "- Initial release" }

          $body = @"
          ## Shuka ${{ github.ref_name }}

          ### What's changed
          $log

          ### 🪟 Windows
          Run ``Shuka-Windows-vx.x.x.exe`` — no admin rights required. Installs to ``%LocalAppData%\Shuka``.

          ### 🤖 Android
          Download the APK and install it. Enable **Install from unknown sources** if prompted.

          | File | Platform |
          |------|----------|
          | ``Shuka-Windows-${{ github.ref_name }}.exe`` | Windows installer |
          | ``Shuka-Windows-${{ github.ref_name }}.zip`` | Windows installer in ZIP |
          | ``Shuka-Android-${{ github.ref_name }}.apk`` | Android direct install |
          | ``Shuka-Android-${{ github.ref_name }}.zip`` | Android APK in ZIP |

          ### Supported sites
          - 52shuku.net
          - czbooks.net (Cloudflare bypass)
          "@

          $body | Out-File -FilePath release_body.txt -Encoding utf8
          echo "FILE=release_body.txt" >> $env:GITHUB_OUTPUT

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          name: Shuka ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: release_body.txt
          files: |
            ${{ steps.rename_apk.outputs.APK_PATH }}
            ${{ steps.zip_apk.outputs.ZIP_PATH }}
